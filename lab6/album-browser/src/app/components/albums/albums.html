<div class="container">
  <div class="section-header">
    <h2 class="section-title">Albums</h2>
    <a routerLink="/home" class="btn-home">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      Home
    </a>
  </div>

  @if (loading) {
    <div class="loading">Loading albums...</div>
  }

  <div class="albums-grid">
    @for (album of albums; track album.id) {
      <div class="album-card">
        <a [routerLink]="['/albums', album.id]" class="album-link">
          <span class="album-id">#{{ album.id }}</span>
          <p class="album-title">{{ album.title }}</p>
        </a>
        <button class="btn-delete" (click)="delete(album.id)">Delete</button>
      </div>
    }
  </div>
</div>
